<svg width="1200" height="500" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SurfCaddy logo</title>
  <desc id="desc">Neon-style SurfCaddy wordmark with surfer silhouettes and tagline Know your break.</desc>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6fe9ff"/>
      <stop offset="100%" stop-color="#3cc8ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="500" fill="#09111b"/>

  <g stroke="url(#neon)" stroke-width="6" fill="none" filter="url(#glow)" opacity="0.9">
    <circle cx="390" cy="115" r="28"/>
    <path d="M355 165c18-30 70-30 88 0v85c0 25-20 45-44 45s-44-20-44-45z"/>
    <circle cx="530" cy="115" r="28"/>
    <path d="M495 165c18-30 70-30 88 0v85c0 25-20 45-44 45s-44-20-44-45z"/>
    <path d="M270 240c170-55 320-55 450 0-150 40-300 40-450 0z"/>
    <path d="M380 280c190-58 360-58 530 0-180 45-350 45-530 0z"/>
  </g>

  <text x="600" y="370" text-anchor="middle" fill="url(#neon)" filter="url(#glow)"
        font-family="Inter, Arial, sans-serif" font-size="110" font-weight="800" letter-spacing="2">
    SURFCADDY
  </text>
  <text x="600" y="430" text-anchor="middle" fill="#d5f8ff"
        font-family="Inter, Arial, sans-serif" font-size="52" font-weight="600" opacity="0.95">
    Know your break.
  </text>
</svg>
